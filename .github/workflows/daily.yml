name: Daily ASX SEPA+VCP Screener Update

on:
  schedule:
    - cron: '0 23 * * 0-4'   # 9:00 AM AEST Mon-Fri
    - cron: '30 0 * * 1-5'   # 10:30 AM AEST Mon-Fri
    - cron: '30 2 * * 1-5'   # 12:30 PM AEST Mon-Fri
    - cron: '30 4 * * 1-5'   # 2:30 PM AEST Mon-Fri
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  update:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, 'Deploy:')"
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run screener and build dashboard
        run: python screener.py
      - name: Deploy to gh-pages branch
        run: |
          git config user.name "ASX Screener Bot"
          git config user.email "bot@asx-screener.com"
          cp index.html /tmp/index.html
          rm -f index.html
          git fetch origin gh-pages 2>/dev/null || true
          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            git checkout gh-pages
            git pull origin gh-pages
          else
            git checkout --orphan gh-pages
          fi
          git rm -rf . 2>/dev/null || true
          cp /tmp/index.html index.html
          git add index.html
          git commit -m "Deploy: $(date '+%d %b %Y %H:%M AEST')" || echo "Nothing to commit"
          git push origin gh-pages
