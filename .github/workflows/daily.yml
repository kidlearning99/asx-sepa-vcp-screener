name: Daily ASX SEPA+VCP Screener Update

on:
  schedule:
    # 9:30 AM AEST (UTC+10) = 23:30 UTC previous night — Mon-Fri
    - cron: '30 23 * * 0-4'
    # 3:00 PM AEST (UTC+10) = 05:00 UTC — Mon-Fri
    - cron: '0 5 * * 1-5'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install yfinance pandas requests

      - name: Run screener and build dashboard
        run: python screener.py

      - name: Deploy to gh-pages branch
        run: |
          git config user.name "ASX Screener Bot"
          git config user.email "bot@asx-screener.com"

          # Save the built file
          cp index.html /tmp/index.html

          # Switch to gh-pages branch (create if needed)
          git fetch origin gh-pages 2>/dev/null || true
          git checkout gh-pages 2>/dev/null || git checkout --orphan gh-pages

          # Clear everything and put just the index
          git rm -rf . 2>/dev/null || true
          cp /tmp/index.html index.html

          git add index.html
          git commit -m "Deploy: $(date '+%d %b %Y %H:%M AEST')" || true
          git push origin gh-pages

          # Also save index.html back to main for reference
          git checkout main
          cp /tmp/index.html index.html
          git add index.html
          git diff --staged --quiet || git commit -m "Auto-update: $(date '+%d %b %Y %H:%M')"
          git push origin main || true
