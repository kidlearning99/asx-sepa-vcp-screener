name: Daily ASX SEPA+VCP Screener Update

on:
  schedule:
    # 9:30 AM AEST (UTC+10) = 23:30 UTC previous night — Mon-Fri
    - cron: '30 23 * * 0-4'
    # 3:00 PM AEST (UTC+10) = 05:00 UTC — Mon-Fri
    - cron: '0 5 * * 1-5'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install yfinance pandas requests

      - name: Run screener and build dashboard
        run: python screener.py

      - name: Prepare GitHub Pages output
        run: |
          mkdir -p _site
          cp index.html _site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Commit updated index.html to repo
        run: |
          git config user.name "ASX Screener Bot"
          git config user.email "bot@asx-screener.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Auto-update: $(date '+%d %b %Y %H:%M')"
          git push || true

  deploy:
    needs: update
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
