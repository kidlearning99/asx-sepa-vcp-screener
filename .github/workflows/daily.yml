name: Daily ASX SEPA+VCP Screener Update

on:
  schedule:
    # 9:30 AM AEST (UTC+10) = 23:30 UTC previous night — Mon-Fri
    - cron: '30 23 * * 0-4'
    # 12:00 PM AEST (UTC+10) = 02:00 UTC — Mon-Fri
    - cron: '0 2 * * 1-5'
    # 3:00 PM AEST (UTC+10) = 05:00 UTC — Mon-Fri
    - cron: '0 5 * * 1-5'
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - '.github/**'

jobs:
  update:
    runs-on: ubuntu-latest
    # Skip if this is an automated bot commit
    if: "!contains(github.event.head_commit.message, 'Deploy:')"
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install yfinance pandas requests

      - name: Run screener and build dashboard
        run: python screener.py

      - name: Enable GitHub Pages via personal token
        env:
          PAT: ${{ secrets.PAT_TOKEN }}
        run: |
          # Try to enable pages (will 409 if already enabled, that's fine)
          curl -s -o /tmp/pages_resp.json -w "%{http_code}" -X POST \
            -H "Authorization: token ${PAT}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/pages" \
            -d '{"source":{"branch":"gh-pages","path":"/"}}' | xargs echo "HTTP:"
          cat /tmp/pages_resp.json
        continue-on-error: true

      - name: Deploy to gh-pages branch
        run: |
          git config user.name "ASX Screener Bot"
          git config user.email "bot@asx-screener.com"
          cp index.html /tmp/index.html
          git fetch origin gh-pages 2>/dev/null || true
          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            git checkout gh-pages
            git pull origin gh-pages
          else
            git checkout --orphan gh-pages
          fi
          git rm -rf . 2>/dev/null || true
          cp /tmp/index.html index.html
          git add index.html
          git commit -m "Deploy: $(date '+%d %b %Y %H:%M AEST')" || echo "Nothing to commit"
          git push origin gh-pages
          git checkout main
