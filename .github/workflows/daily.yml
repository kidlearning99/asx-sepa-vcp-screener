name: Daily ASX SEPA+VCP Screener Update

on:
  schedule:
    # 9:30 AM AEST (UTC+10) = 23:30 UTC previous night — Mon-Fri
    - cron: '30 23 * * 0-4'
    # 3:00 PM AEST (UTC+10) = 05:00 UTC — Mon-Fri
    - cron: '0 5 * * 1-5'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install yfinance pandas requests

      - name: Run screener and build dashboard
        run: python screener.py

      - name: Enable GitHub Pages (if not already enabled)
        run: |
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/pages \
            -d '{"source":{"branch":"gh-pages","path":"/"}}' || true
        continue-on-error: true

      - name: Deploy to gh-pages branch
        run: |
          git config user.name "ASX Screener Bot"
          git config user.email "bot@asx-screener.com"

          cp index.html /tmp/index.html

          git fetch origin gh-pages 2>/dev/null || true
          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            git checkout gh-pages
            git pull origin gh-pages
          else
            git checkout --orphan gh-pages
          fi

          git rm -rf . 2>/dev/null || true
          cp /tmp/index.html index.html
          git add index.html
          git commit -m "Deploy: $(date '+%d %b %Y %H:%M AEST')" || echo "Nothing to commit"
          git push origin gh-pages

          git checkout main
