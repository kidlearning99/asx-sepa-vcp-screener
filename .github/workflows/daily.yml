name: Daily ASX SEPA+VCP Screener Update

on:
  schedule:
    - cron: '30 22 * * 0-4'
    - cron: '0 3 * * 1-5'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install yfinance pandas requests

      - name: Run screener and build dashboard
        env:
          NETLIFY_TOKEN: ${{ secrets.NETLIFY_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: python screener.py

      - name: Deploy to Netlify
        env:
          NETLIFY_TOKEN: ${{ secrets.NETLIFY_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          FILE_SHA=$(sha1sum index.html | awk '{print $1}')
          echo "File SHA: $FILE_SHA"
          DEPLOY=$(curl -sf -X POST \
            "https://api.netlify.com/api/v1/sites/${NETLIFY_SITE_ID}/deploys" \
            -H "Authorization: Bearer ${NETLIFY_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"files\":{\"\/index.html\":\"$FILE_SHA\"}}")
          echo "Deploy response: $DEPLOY"
          DEPLOY_ID=$(echo "$DEPLOY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('id',''))" 2>/dev/null || echo "")
          echo "Deploy ID: $DEPLOY_ID"
          if [ -n "$DEPLOY_ID" ]; then
            UPLOAD=$(curl -sf -X PUT \
              "https://api.netlify.com/api/v1/deploys/${DEPLOY_ID}/files/index.html" \
              -H "Authorization: Bearer ${NETLIFY_TOKEN}" \
              -H "Content-Type: application/octet-stream" \
              --data-binary @index.html)
            echo "Upload result: $UPLOAD"
            echo "Netlify deploy complete"
          else
            echo "ERROR: Could not get deploy ID — check NETLIFY_TOKEN and NETLIFY_SITE_ID secrets"
          fi

      - name: Commit updated index.html
        run: |
          git config user.name "ASX Screener Bot"
          git config user.email "bot@asx-screener.com"
          git add index.html data/ || true
          git diff --staged --quiet || git commit -m "Auto-update: $(date '+%d %b %Y %H:%M')"
          git push || true
