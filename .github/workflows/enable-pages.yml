name: Enable GitHub Pages

on:
  workflow_dispatch:

jobs:
  enable:
    runs-on: ubuntu-latest
    steps:
      - name: Check and enable GitHub Pages
        run: |
          echo "=== Current Pages status ==="
          curl -s \
            -H "Authorization: token ${{ secrets.PAT_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/KidLearning99/asx-sepa-vcp-screener/pages"

          echo ""
          echo "=== Setting source to gh-pages branch ==="
          curl -s -X PUT \
            -H "Authorization: token ${{ secrets.PAT_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/KidLearning99/asx-sepa-vcp-screener/pages" \
            -d '{"source":{"branch":"gh-pages","path":"/"}}'

          echo ""
          echo "=== Pages status after update ==="
          curl -s \
            -H "Authorization: token ${{ secrets.PAT_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/KidLearning99/asx-sepa-vcp-screener/pages"
