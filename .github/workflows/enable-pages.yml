name: Enable GitHub Pages

on:
  workflow_dispatch:

jobs:
  enable:
    runs-on: ubuntu-latest
    steps:
      - name: Switch Pages to legacy branch mode
        run: |
          echo "=== Switching build_type to legacy (branch deploy) ==="
          curl -s -X PUT \
            -H "Authorization: token ${{ secrets.PAT_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/KidLearning99/asx-sepa-vcp-screener/pages" \
            -d '{"build_type":"legacy","source":{"branch":"gh-pages","path":"/"}}'

          echo ""
          echo "=== Pages status after update ==="
          curl -s \
            -H "Authorization: token ${{ secrets.PAT_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/KidLearning99/asx-sepa-vcp-screener/pages"
